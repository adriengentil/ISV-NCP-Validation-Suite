# Kubernetes-as-a-Service (KaaS) Cluster Validation - Template Configuration
#
# This is a PROVIDER-AGNOSTIC template for testing GPU-enabled Kubernetes
# cluster lifecycle: provision -> validate -> workloads -> teardown.
# Copy this file and the accompanying stubs/ scripts, then replace the
# script implementations with your platform's provisioning logic.
#
# Architecture:
#   - Scripts: Platform-specific (YOU implement these) - provision/teardown cluster
#   - Validations: Platform-agnostic (provided) - Kubernetes API checks
#
# Contract:
#   Setup script must configure kubectl access (e.g., write kubeconfig)
#   and output a JSON object to stdout. Validations use kubectl directly.
#
# Steps:
#   1. provision_cluster  (setup)    - Provision K8s cluster, configure kubectl
#   2. teardown_cluster   (teardown) - Destroy cluster and resources
#
# Quick start:
#   1. Copy this folder:  cp -r templates/ my-isv/
#   2. Edit the stubs:    my-isv/stubs/kaas/setup.sh, teardown.sh
#   3. Run:               uv run isvctl test run -f isvctl/configs/my-isv/kaas.yaml
#
# See also:
#   - AWS reference implementation: ../aws/eks.yaml + ../stubs/aws/eks/
#   - Terraform example: ../stubs/aws/eks/terraform/

version: "1.0"

commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      # ─── Setup: Provision Cluster ──────────────────────────────────
      # YOUR SCRIPT must:
      #   1. Provision a Kubernetes cluster with GPU nodes
      #   2. Configure kubectl (write kubeconfig)
      #   3. Print JSON to stdout:
      #      {
      #        "success": true,
      #        "platform": "kubernetes",
      #        "cluster_name": "<cluster-name>",
      #        "cluster_endpoint": "<api-server-url>",
      #        "node_count": <int>,
      #        "gpu_node_count": <int>
      #      }
      - name: provision_cluster
        phase: setup
        command: "./stubs/kaas/setup.sh"
        timeout: 1800
        env:
          CLUSTER_REGION: "us-west-2"

      # ─── Teardown: Destroy Cluster ────────────────────────────────
      # YOUR SCRIPT must destroy all cluster resources.
      - name: teardown_cluster
        phase: teardown
        command: "./stubs/kaas/teardown.sh"
        timeout: 1800
        env:
          # Override with TEARDOWN_ENABLED=false to preserve resources for debugging
          TEARDOWN_ENABLED: "true"

tests:
  cluster_name: "{{inventory.cluster_name}}"
  description: "Kubernetes GPU cluster validation (template)"
  platform: kubernetes

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These use kubectl (configured by setup script) to check cluster state.
  # Adjust counts and settings to match your cluster configuration.
  validations:
    kubernetes:
      - K8sNodeCountCheck:
          count: "3"
      - K8sNodeReadyCheck:
          require_all_ready: true
      - K8sNvidiaSmiCheck:
          runtime_class: "nvidia"
      - K8sDriverVersionCheck:
          driver_version: "570.195.03"
          runtime_class: "nvidia"
      - K8sGpuPodAccessCheck:
          gpu_count: 1
          total_gpu_count: 1
          runtime_class: "nvidia"
      - K8sGpuCapacityCheck:
          resource_name: "nvidia.com/gpu"
          expected_per_node: 1
          expected_total: 3
      - K8sGpuOperatorNamespaceCheck:
          namespace: "gpu-operator"
      - K8sGpuOperatorPodsCheck:
          namespace: "gpu-operator"
      - K8sGpuLabelsCheck:
          label_selector: "nvidia.com/gpu.present=true"
      - K8sPodHealthCheck:
          ignore_phases: ["Pending"]
      - K8sNoPendingPodsCheck: {}
      - K8sNoErrorPodsCheck:
          error_states: ["Error", "CrashLoopBackOff"]

    k8s_workloads:
      - K8sNcclWorkload:
          min_bus_bw_gbps: 100
      - K8sGpuStressWorkload:
          memory_gb: 1
          runtime: 30
      - K8sNimInferenceWorkload:
          timeout: 1500
      - K8sNimHelmWorkload-1b:
          model: "meta/llama-3.2-1b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 900
          genai_perf_requests: 100
          genai_perf_concurrency: 4
      - K8sNimHelmWorkload-3b:
          model: "meta/llama-3.2-3b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 1800
          genai_perf_requests: 200
          genai_perf_concurrency: 8

  exclude:
    markers: []
